# kapı örnek yapılandırması — kopyalayıp kapi.yaml yap, kendi modellerine göre düzenle.
# Güvenlik:
#   * Sadece 127.0.0.1 dinle. Dışa açacaksan require_key:true + güvenlik duvarı.
#   * API anahtarlarını DÜZ METİN yazma; ${ENV_DEGISKEN} ile enjekte et.
#   * log_bodies'i prod'da açma (KVKK: prompt/yanıt içeriği diske yazılır).

server:
  host: 127.0.0.1
  port: 4100

security:
  require_key: false
  keys: []
  # keys:
  #   - ${KAPI_KEY}                  # kısıtsız anahtar
  #   - key: ${UYGULAMA_KEY}         # scope'lu: bu anahtar yalnız listedeki modelleri görür
  #     models: [yerel-hizli]        #   (fallback bile scope dışına çıkamaz → 403)
  log_bodies: false                  # KVKK: prod'da açma (içerik diske yazılır)

  # KVKK: dış sağlayıcıya GİTMEDEN hassas veriyi maskele. Yerel 'ollama' hariç tutulur;
  # bir modelde 'redact: true/false' ile override edebilirsin.
  redact_pii: false
  pii: [tckn, telefon, email, iban]
  # audit_log: kapi-audit.jsonl      # istek başına SADECE metadata (model/status/ms) — içerik YOK

routing:
  timeout_ms: 120000
  fallbacks:
    yerel-hizli: [deepseek, yerel-buyuk]

models:
  - name: yerel-hizli
    provider: ollama
    model: qwen2.5:7b

  - name: yerel-buyuk
    provider: ollama
    model: qwen2.5:32b

  # DEEPSEEK_API_KEY ortam değişkeni ister; kullanmıyorsan bu modeli ve
  # fallbacks'teki 'deepseek' referansını sil.
  - name: deepseek
    provider: openai-compatible
    api_base: https://api.deepseek.com
    model: deepseek-chat
    api_key: ${DEEPSEEK_API_KEY}

  # Anthropic (Claude) — native sağlayıcı. OpenAI ↔ Messages çevirisini kapı yapar.
  # ANTHROPIC_API_KEY ister. İstemci yine OpenAI formatı konuşur.
  # - name: claude
  #   provider: anthropic
  #   model: claude-sonnet-4-6
  #   api_key: ${ANTHROPIC_API_KEY}
  #   max_tokens: 4096        # Messages API zorunlu kılar; varsayılan 4096
